worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout;

    # Proxy for Anna's Archive (Kindle can't do TLS 1.3)
    server {
        listen 8118;

        location / {
            proxy_pass https://annas-archive.gl;
            proxy_set_header Host annas-archive.gl;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            proxy_set_header Accept-Encoding "";
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_buffering on;
        }
    }

    # Proxy for LibGen (lgli downloads)
    server {
        listen 8119;

        location / {
            proxy_pass https://libgen.li;
            proxy_set_header Host libgen.li;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            proxy_set_header Accept-Encoding "";
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_buffering on;
        }
    }

    # Proxy for Z-Library (zlib downloads)
    server {
        listen 8120;

        location / {
            proxy_pass https://z-lib.fm;
            proxy_set_header Host z-lib.fm;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            proxy_set_header Accept-Encoding "";
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_buffering on;
        }
    }
}
